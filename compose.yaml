services:
  web:
    build:
      context: .
    environment:
      BLOG_POSTS_ENDPOINT: ${BLOG_POSTS_ENDPOINT:-http://localhost:80/blog/posts}
    ports:
      - "80:80"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - blog_posts:/srv/blog-posts:ro

volumes:
  blog_posts:
